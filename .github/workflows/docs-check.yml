name: Check generated docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 bin/gen-docs --check
